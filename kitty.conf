include everforest.conf

# ============================================
# 键盘协议设置
# ============================================
# 使用应用模式以兼容 tmux
kitty_mod ctrl+shift

# ============================================
# 字体配置
# ============================================
# 统一使用 Monaspace Argon 系列，自动处理斜体和加粗
font_family      family="Monaspace Argon" style="Regular"
bold_font        family="Monaspace Argon" style="Bold"
italic_font      family="Monaspace Xenon" style="Regular"
bold_italic_font family="Monaspace Xenon" style="Bold"

# 字体大小
font_size 10.0

# 字体特性 - 启用 OpenType 特性 (Monaspace 系列特性)
font_features MonaspaceArgon-Regular +calt +ss01 +ss02 +ss03 +ss07 +ss08 +ss09 +liga
font_features MonaspaceArgon-Bold +calt +ss01 +ss02 +ss03 +ss07 +ss08 +ss09 +liga
font_features MonaspaceArgon-Italic +calt +ss01 +ss02 +ss03 +ss07 +ss08 +ss09 +liga
font_features MonaspaceArgon-BoldItalic +calt +ss01 +ss02 +ss03 +ss07 +ss08 +ss09 +liga
font_features MonaspaceXenon-Regular +calt +ss01 +ss02 +ss03 +ss07 +ss08 +ss09 +liga
font_features MonaspaceXenon-Bold +calt +ss01 +ss02 +ss03 +ss07 +ss08 +ss09 +liga
font_features MonaspaceXenon-Italic +calt +ss01 +ss02 +ss03 +ss07 +ss08 +ss09 +liga
font_features MonaspaceXenon-BoldItalic +calt +ss01 +ss02 +ss03 +ss07 +ss08 +ss09 +liga

symbol_map U+E000-U+F8FF Symbols Nerd Font
symbol_map U+23FB-U+23FE Symbols Nerd Font
symbol_map U+2665 U+2665 Symbols Nerd Font
symbol_map U+26A1 U+26A1 Symbols Nerd Font
symbol_map U+2B58 U+2B58 Symbols Nerd Font

# ============================================
# 复制粘贴 (混合方案: Kitty 鼠标 + Tmux 键盘)
# ============================================
# 鼠标选择即复制到剪贴板
copy_on_select clipboard

# 智能去除尾部空格
strip_trailing_spaces smart

# URL 点击打开
url_style curly
open_url_with default

# 基础快捷键 (非 tmux 场景使用)
# 复制: Ctrl+Shift+C 或 Shift+Alt+C
map ctrl+shift+c copy_to_clipboard
map shift+alt+c copy_to_clipboard
# 粘贴: Ctrl+Shift+V 或 Shift+Alt+V
map ctrl+shift+v paste_from_clipboard
map shift+alt+v paste_from_clipboard

# ============================================
# 滚动
# ============================================
scrollback_lines 10000

# 滚动快捷键 (非 tmux 场景使用)
map ctrl+shift+up        scroll_line_up
map ctrl+shift+down      scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end

# ============================================
# 其他基础配置
# ============================================
# 配置重载
map ctrl+shift+f5 load_config_file
map shift+alt+r   load_config_file

# 缩放字体
map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0     change_font_size all 0
